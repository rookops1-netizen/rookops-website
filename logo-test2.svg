<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Rook corvid logo - clean minimal line art -->
  <!-- Distinctive thick beak (rook feature) -->
  <path d="M152 78 L178 72 L164 88 Z" fill="currentColor" stroke="none"/>
  <!-- Head -->
  <ellipse cx="138" cy="72" rx="18" ry="20" fill="none" stroke="currentColor" stroke-width="6"/>
  <!-- Eye -->
  <circle cx="142" cy="68" r="5" fill="currentColor"/>
  <!-- Body -->
  <path d="M120 88 C110 100, 100 120, 102 148 C104 170, 116 190, 128 200 C140 210, 156 210, 168 200 C180 190, 186 170, 184 148 C182 120, 172 100, 156 88" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Wing -->
  <path d="M112 130 C130 120, 158 126, 176 148" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
  <!-- Tail -->
  <path d="M100 170 C88 185, 82 200, 84 215" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
  <path d="M94 175 C86 190, 82 205, 78 215" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="120" y1="200" x2="118" y2="230" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <line x1="148" y1="200" x2="150" y2="230" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <!-- Feet -->
  <path d="M108 230 L118 230 L128 230" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M140 230 L150 230 L160 230" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>