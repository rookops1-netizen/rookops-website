  <!-- Head and body outline -->
  <path d="M42 22 C40 18, 36 16, 32 18 C28 16, 24 18, 22 22 C20 26, 18 32, 20 38 C22 42, 26 46, 32 48 C38 46, 42 42, 44 38 C46 32, 44 26, 42 22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Eye -->
